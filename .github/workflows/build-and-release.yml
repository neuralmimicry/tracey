---
name: Build and Release

"on":
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_release:
        description: >-
          Publish a GitHub release from the selected v* tag ref
        required: true
        type: boolean
        default: false
      draft_release:
        description: "Mark a manually published release as draft"
        required: true
        type: boolean
        default: false
      prerelease:
        description: "Mark a manually published release as prerelease"
        required: true
        type: boolean
        default: false
      sign_update_bundle:
        description: >-
          Generate signed tracey.update artifacts when TRACEY_UPDATE_KEY is
          configured
        required: true
        type: boolean
        default: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: build-and-release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  verify:
    name: verify
    strategy:
      matrix:
        include:
          - arch: amd64
            runner_arch: X64
          - arch: arm64
            runner_arch: ARM64
    runs-on: [ self-hosted, Linux, "${{ matrix.runner_arch }}" ]
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run preflight checks
        run: bash scripts/preflight.sh

      - name: Check build
        run: cargo check --locked --all-targets

      - name: Run tests
        run: cargo test --locked

      - name: Smoke test TUI help
        run: cargo run --locked --bin tracey -- --tui --help

      - name: Validate shell scripts
        run: bash -n scripts/preflight.sh scripts/install-service.sh scripts/package-release.sh

  release-meta:
    name: release-meta
    needs: verify
    strategy:
      matrix:
        include:
          - arch: amd64
            runner_arch: X64
          - arch: arm64
            runner_arch: ARM64
    runs-on: [self-hosted, Linux, "${{ matrix.runner_arch }}"]
    outputs:
      artifact_version: ${{ steps.meta.outputs.artifact_version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      publish_release: ${{ steps.meta.outputs.publish_release }}
      create_release_tag: ${{ steps.meta.outputs.create_release_tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Compute artifact metadata
        id: meta
        shell: bash
        env:
          MANUAL_PUBLISH_REQUEST: >-
            ${{ github.event_name == 'workflow_dispatch' &&
            inputs.publish_release || false }}
        run: |
          set -euo pipefail
          cargo_version=$(
            sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1
          )
          candidate_tag="v${cargo_version}"
          short_sha="${GITHUB_SHA:0:7}"
          release_tag=""
          publish_release="false"
          create_release_tag="false"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            release_tag="${GITHUB_REF#refs/tags/}"
            artifact_version="${release_tag#v}"
            if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
              publish_release="true"
            elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && \
                    "${MANUAL_PUBLISH_REQUEST}" == "true" ]]; then
              publish_release="true"
            fi
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && \
                  "${GITHUB_REF}" == "refs/heads/main" ]]; then
            if git ls-remote --exit-code --tags --refs origin \
              "refs/tags/${candidate_tag}" >/dev/null 2>&1; then
              artifact_version="${cargo_version}-dev.${GITHUB_RUN_NUMBER}.${short_sha}"
            else
              release_tag="${candidate_tag}"
              artifact_version="${cargo_version}"
              publish_release="true"
              create_release_tag="true"
            fi
          else
            artifact_version="${cargo_version}-dev.${GITHUB_RUN_NUMBER}.${short_sha}"
          fi

          if [[ -n "$release_tag" && \
                "$artifact_version" != "$cargo_version" ]]; then
            echo "::error::Tag ${release_tag} does not match Cargo.toml"
            echo "::error::version ${cargo_version}"
            exit 1
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "artifact_version=$artifact_version" >> "$GITHUB_OUTPUT"
          echo "publish_release=$publish_release" >> "$GITHUB_OUTPUT"
          echo "create_release_tag=$create_release_tag" >> "$GITHUB_OUTPUT"

  package-linux:
    name: package-linux (${{ matrix.platform }})
    needs:
      - verify
      - release-meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: X64
            rust_target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            archive_format: tar.gz
            binary_suffix: ""
            deb_arch: amd64
            supports_update_bundle: true
          - runner: ARM64
            rust_target: aarch64-unknown-linux-gnu
            platform: linux-aarch64
            archive_format: tar.gz
            binary_suffix: ""
            deb_arch: arm64
            supports_update_bundle: true
    runs-on: [self-hosted, Linux, "${{ matrix.runner }}"]
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-
            ${{ runner.os }}-cargo-

      - name: Package Linux release artifacts
        env:
          TRACEY_UPDATE_KEY: ${{ secrets.TRACEY_UPDATE_KEY }}
          MANUAL_SIGN_REQUEST: >-
            ${{ github.event_name == 'workflow_dispatch' &&
            inputs.sign_update_bundle }}
        run: |
          set -euo pipefail
          args=(
            --version "${{ needs.release-meta.outputs.artifact_version }}"
            --output-dir "./dist"
            --target-triple "${{ matrix.rust_target }}"
            --platform "${{ matrix.platform }}"
            --archive-format "${{ matrix.archive_format }}"
            --binary-suffix "${{ matrix.binary_suffix }}"
            --deb-arch "${{ matrix.deb_arch }}"
          )

          if [[ "${{ matrix.supports_update_bundle }}" == "true" ]]; then
            if [[ -n "${{ needs.release-meta.outputs.release_tag }}" && \
                  -n "${TRACEY_UPDATE_KEY:-}" ]]; then
              args+=(--sign-update)
            elif [[ "${MANUAL_SIGN_REQUEST}" == "true" ]]; then
              if [[ -z "${TRACEY_UPDATE_KEY:-}" ]]; then
                echo "::error::TRACEY_UPDATE_KEY secret is required"
                echo "::error::when sign_update_bundle is enabled"
                exit 1
              fi
              args+=(--sign-update)
            fi
          fi

          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh "${args[@]}"

      - name: Validate Debian package metadata
        run: |
          set -euo pipefail
          deb_path="$(find dist -maxdepth 1 -type f -name 'tracey_*.deb' | head -n 1)"
          if [[ -z "$deb_path" ]]; then
            echo "::error::Expected a Debian package under dist/"
            exit 1
          fi

          expected_version="$(basename "$deb_path" | sed -E 's/^tracey_(.*)_[^_]+\.deb$/\1/')"
          actual_package="$(dpkg-deb -f "$deb_path" Package)"
          actual_version="$(dpkg-deb -f "$deb_path" Version)"
          actual_arch="$(dpkg-deb -f "$deb_path" Architecture)"

          [[ "$actual_package" == "tracey" ]]
          [[ "$actual_version" == "$expected_version" ]]
          [[ "$actual_arch" == "${{ matrix.deb_arch }}" ]]

      - name: Smoke install Debian package
        run: |
          set -euo pipefail
          deb_path="$(find dist -maxdepth 1 -type f -name 'tracey_*.deb' | head -n 1)"
          deb_path="$(readlink -f "$deb_path")"

          sudo apt-get update
          sudo apt-get install -y --allow-downgrades "$deb_path"

          tracey --version
          tracey-loader --version
          dpkg-query -W -f='${Version}\n' tracey

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-assets-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  package-release:
    name: package-release (${{ matrix.platform }})
    needs:
      - verify
      - release-meta
    runs-on: [self-hosted, Linux, "${{ matrix.runner }}"]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            platform: macos-x86_64
            archive_format: tar.gz
            binary_suffix: ""
            supports_update_bundle: false
          - runner: macos-15
            rust_target: aarch64-apple-darwin
            platform: macos-aarch64
            archive_format: tar.gz
            binary_suffix: ""
            supports_update_bundle: false
          - runner: windows-2025
            rust_target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            archive_format: zip
            binary_suffix: ".exe"
            supports_update_bundle: false
          - runner: macos-15
            rust_target: aarch64-apple-ios
            platform: ios-arm64
            archive_format: tar.gz
            binary_suffix: ""
            supports_update_bundle: false
          - runner: X64
            rust_target: aarch64-linux-android
            platform: android-arm64
            archive_format: tar.gz
            binary_suffix: ""
            supports_update_bundle: false
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-
            ${{ runner.os }}-cargo-

      - name: Configure Android linker
        if: ${{ matrix.platform == 'android-arm64' }}
        run: |
          set -euo pipefail
          ndk_root="${ANDROID_NDK_LATEST_HOME:-${ANDROID_NDK_ROOT:-}}"
          if [[ -z "$ndk_root" ]]; then
            sdk_root="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
            if [[ -z "$sdk_root" || ! -d "$sdk_root/ndk" ]]; then
              echo "::error::Android SDK/NDK path was not found on the runner"
              exit 1
            fi
            ndk_root="$(find "$sdk_root/ndk" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          fi

          if [[ -z "$ndk_root" || ! -d "$ndk_root" ]]; then
            echo "::error::Android NDK directory could not be resolved"
            exit 1
          fi

          toolchain="$ndk_root/toolchains/llvm/prebuilt/linux-x86_64"
          linker="$toolchain/bin/aarch64-linux-android21-clang"
          cxx="$toolchain/bin/aarch64-linux-android21-clang++"
          ar="$toolchain/bin/llvm-ar"

          if [[ ! -x "$linker" || ! -x "$cxx" || ! -x "$ar" ]]; then
            echo "::error::Android NDK toolchain binaries were not found under $toolchain"
            exit 1
          fi

          {
            echo "ANDROID_NDK_ROOT=$ndk_root"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$linker"
            echo "CC_aarch64_linux_android=$linker"
            echo "CXX_aarch64_linux_android=$cxx"
            echo "AR_aarch64_linux_android=$ar"
          } >> "$GITHUB_ENV"

      - name: Configure iOS linker
        if: ${{ matrix.platform == 'ios-arm64' }}
        run: |
          set -euo pipefail
          sdk_path="$(xcrun --sdk iphoneos --show-sdk-path)"
          clang_path="$(xcrun --sdk iphoneos --find clang)"
          ar_path="$(xcrun --sdk iphoneos --find ar)"

          {
            echo "SDKROOT=$sdk_path"
            echo "CARGO_TARGET_AARCH64_APPLE_IOS_LINKER=$clang_path"
            echo "CC_aarch64_apple_ios=$clang_path"
            echo "AR_aarch64_apple_ios=$ar_path"
          } >> "$GITHUB_ENV"

      - name: Package release artifacts
        env:
          TRACEY_UPDATE_KEY: ${{ secrets.TRACEY_UPDATE_KEY }}
          MANUAL_SIGN_REQUEST: >-
            ${{ github.event_name == 'workflow_dispatch' &&
            inputs.sign_update_bundle }}
        run: |
          set -euo pipefail
          args=(
            --version "${{ needs.release-meta.outputs.artifact_version }}"
            --output-dir "./dist"
            --target-triple "${{ matrix.rust_target }}"
            --platform "${{ matrix.platform }}"
            --archive-format "${{ matrix.archive_format }}"
            --binary-suffix "${{ matrix.binary_suffix }}"
          )

          if [[ "${{ matrix.supports_update_bundle }}" == "true" ]]; then
            if [[ -n "${{ needs.release-meta.outputs.release_tag }}" && \
                  -n "${TRACEY_UPDATE_KEY:-}" ]]; then
              args+=(--sign-update)
            elif [[ "${MANUAL_SIGN_REQUEST}" == "true" ]]; then
              if [[ -z "${TRACEY_UPDATE_KEY:-}" ]]; then
                echo "::error::TRACEY_UPDATE_KEY secret is required"
                echo "::error::when sign_update_bundle is enabled"
                exit 1
              fi
              args+=(--sign-update)
            fi
          fi

          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh "${args[@]}"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-assets-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: publish-release
    needs:
      - release-meta
      - package-linux
      - package-release
    runs-on: [self-hosted, Linux, X64]
    if: >-
      always() &&
      needs.release-meta.outputs.publish_release == 'true' &&
      needs.package-linux.result == 'success' &&
      (
        needs.release-meta.outputs.create_release_tag == 'true' ||
        needs.package-release.result == 'success'
      )
    permissions:
      contents: write
    steps:
      - name: Validate publish target
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ needs.release-meta.outputs.release_tag }}" ]]; then
            echo "::error::Publishing requires a resolved release tag"
            exit 1
          fi

      - name: Ensure release tag exists on GitHub
        if: ${{ needs.release-meta.outputs.create_release_tag == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.release-meta.outputs.release_tag }}
        run: |
          set -euo pipefail
          if gh api "repos/${GH_REPO}/git/ref/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            exit 0
          fi

          gh api "repos/${GH_REPO}/git/refs" \
            --method POST \
            -f ref="refs/tags/${RELEASE_TAG}" \
            -f sha="${GITHUB_SHA}"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./dist

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.release-meta.outputs.release_tag }}
          DRAFT_RELEASE: >-
            ${{ github.event_name == 'workflow_dispatch' &&
            inputs.draft_release }}
          MANUAL_PRERELEASE: >-
            ${{ github.event_name == 'workflow_dispatch' &&
            inputs.prerelease }}
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find dist -type f -print0 | sort -z)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::No packaged artifacts were downloaded"
            exit 1
          fi

          title="Tracey ${RELEASE_TAG}"
          prerelease="${MANUAL_PRERELEASE}"
          if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" && \
                "${RELEASE_TAG}" == *-* ]]; then
            prerelease="true"
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${files[@]}" --clobber
            exit 0
          fi

          args=(
            "${RELEASE_TAG}"
            "${files[@]}"
            --target "${GITHUB_SHA}"
            --title "${title}"
            --generate-notes
          )

          if [[ "${DRAFT_RELEASE}" == "true" ]]; then
            args+=(--draft)
          fi
          if [[ "${prerelease}" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
