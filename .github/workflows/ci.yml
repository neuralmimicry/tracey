name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify (${{ matrix.runner_arch }})
    runs-on: [self-hosted, Linux, "${{ matrix.runner_arch }}"]
    strategy:
      fail-fast: false
      matrix:
        runner_arch: [X64, ARM64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run preflight checks
        run: bash scripts/preflight.sh

      - name: Check formatting
        run: cargo fmt --check

      - name: Check build
        run: cargo check --locked --all-targets

      - name: Run tests
        run: cargo test --locked

      - name: Smoke test TUI help
        run: cargo run --locked --bin tracey -- --tui --help

      - name: Validate shell scripts
        run: bash -n scripts/preflight.sh scripts/install-service.sh scripts/package-release.sh
